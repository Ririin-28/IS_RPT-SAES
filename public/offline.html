<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connection Issue | RPT-SAES</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      color-scheme: light;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #16a34a;
      --primary-hover: #15803d;
      --secondary: rgba(148, 163, 184, 0.12);
      --secondary-hover: rgba(148, 163, 184, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.16), transparent 30%),
        linear-gradient(180deg, #0f172a 0%, #020617 100%);
      color: var(--text);
    }

    .card {
      width: min(100%, 640px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #86efac;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 16px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.1);
      color: var(--text);
      font-size: 0.92rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a, button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    button {
      background: var(--primary);
      color: #f8fafc;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    a {
      background: var(--secondary);
      color: var(--text);
    }

    a:hover {
      background: var(--secondary-hover);
      transform: translateY(-1px);
    }

    .small {
      margin-top: 22px;
      font-size: 0.82rem;
      color: #64748b;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px;
        border-radius: 20px;
      }

      .actions a,
      .actions button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">RPT-SAES</p>
    <h1 id="title">Checking connection...</h1>
    <p id="message">
      We could not load the requested page. Please try again after checking your network or server connection.
    </p>
    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      <span id="status-text">Connection issue detected</span>
    </div>
    <div class="actions">
      <button type="button" onclick="location.reload()">Retry</button>
      <a href="/">Back to Home</a>
    </div>
    <p class="small">This page appears when RPT-SAES cannot be reached or is temporarily unavailable.</p>
  </main>
  <script>
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const statusText = document.getElementById('status-text');
    const dot = document.querySelector('.dot');

    const applyStatus = () => {
      if (navigator.onLine) {
        title.textContent = 'RPT-SAES is temporarily unavailable';
        message.textContent = 'Your device appears to be online, but the site could not be reached or returned an unexpected error. Please try again in a moment.';
        statusText.textContent = 'Internet detected, service unreachable';
        dot.style.background = '#f59e0b';
        dot.style.boxShadow = '0 0 0 6px rgba(245, 158, 11, 0.15)';
        return;
      }

      title.textContent = 'No internet connection';
      message.textContent = 'Your device is offline. Reconnect to the internet, then retry loading RPT-SAES.';
      statusText.textContent = 'Offline mode';
      dot.style.background = '#ef4444';
      dot.style.boxShadow = '0 0 0 6px rgba(239, 68, 68, 0.15)';
    };

    applyStatus();
    window.addEventListener('online', applyStatus);
    window.addEventListener('offline', applyStatus);
  </script>
</body>
</html>
